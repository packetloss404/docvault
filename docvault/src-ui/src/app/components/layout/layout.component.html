<!-- Top Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
  <div class="d-flex align-items-center">
    <button class="btn btn-dark me-2 d-md-none" (click)="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>
    <a class="navbar-brand fw-bold" routerLink="/">DocVault</a>
  </div>

  <div class="d-flex align-items-center">
    <div class="input-group me-3 d-none d-md-flex" style="width: 300px;">
      <input
        type="text"
        class="form-control form-control-sm"
        placeholder="Search documents..."
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        (keyup.enter)="onSearch()"
      />
      <button class="btn btn-outline-secondary btn-sm" type="button" (click)="onSearch()">
        <i class="bi bi-search"></i>
      </button>
    </div>

    <div class="dropdown">
      <button
        class="btn btn-dark dropdown-toggle"
        type="button"
        data-bs-toggle="dropdown"
      >
        <i class="bi bi-person-circle me-1"></i>
        {{ auth.currentUser()?.username || 'User' }}
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" routerLink="/profile"><i class="bi bi-person me-2"></i>Profile</a></li>
        <li><hr class="dropdown-divider" /></li>
        <li><a class="dropdown-item" href="#" (click)="onLogout(); $event.preventDefault()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main Content Area -->
<div class="d-flex">
  <!-- Sidebar -->
  <div class="sidebar d-none d-md-block" [class.d-block]="!sidebarCollapsed" style="width: 240px;">
    <nav class="nav flex-column pt-2">
      <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
      <a class="nav-link" routerLink="/documents" routerLinkActive="active">
        <i class="bi bi-file-earmark-text"></i> Documents
      </a>
      <a class="nav-link" routerLink="/search" routerLinkActive="active">
        <i class="bi bi-search"></i> Search
      </a>
      <a class="nav-link" routerLink="/tags" routerLinkActive="active">
        <i class="bi bi-tags"></i> Tags
      </a>
      <a class="nav-link" routerLink="/correspondents" routerLinkActive="active">
        <i class="bi bi-people"></i> Correspondents
      </a>
      <a class="nav-link" routerLink="/cabinets" routerLinkActive="active">
        <i class="bi bi-folder"></i> Cabinets
      </a>

      @if (sidebarViews().length > 0) {
        <hr class="border-secondary mx-3" />
        <span class="nav-link text-muted small py-1"><i class="bi bi-bookmark"></i> Saved Views</span>
        @for (view of sidebarViews(); track view.id) {
          <a class="nav-link py-1 ps-4" [routerLink]="['/saved-views', view.id, 'results']">
            {{ view.name }}
          </a>
        }
      }

      <hr class="border-secondary mx-3" />

      <a class="nav-link" routerLink="/saved-views" routerLinkActive="active">
        <i class="bi bi-bookmarks"></i> Saved Views
      </a>
      <a class="nav-link" routerLink="/custom-fields" routerLinkActive="active">
        <i class="bi bi-input-cursor-text"></i> Custom Fields
      </a>
      <a class="nav-link" routerLink="/metadata-types" routerLinkActive="active">
        <i class="bi bi-card-list"></i> Metadata Types
      </a>
      <a class="nav-link" routerLink="/workflows" routerLinkActive="active">
        <i class="bi bi-diagram-3"></i> Workflows
      </a>
    </nav>
  </div>

  <!-- Content -->
  <div class="content-area flex-grow-1 p-4">
    <router-outlet />
  </div>
</div>
